<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>موزّع رأس المال | Mr Haimore Tools</title>
    <meta
      name="description"
      content="أداة تعليمية مجانية ومفتوحة المصدر تساعدك على تقسيم رأس مالك قبل الدخول إلى السوق، لتقليل التداول العاطفي وتعلّم إدارة رأس المال بشكل صحيح."
    />
    <!-- Prevent flash of wrong theme -->
    <script>
      try {
        var t = localStorage.getItem('mr-haimore-theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
